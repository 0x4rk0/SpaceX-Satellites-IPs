name: SpaceX satellite IP discovery

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Collect Shodan SpaceX IPs"
    types:
      - completed
  push:
    paths:
      - ".github/workflows/network-traces.yml"
      - "scripts/run_network_traces.sh"
      - "targets/spacex_ips.tsv"

permissions:
  contents: write

jobs:
  traces:
    name: Run traceroute against SpaceX targets
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure traceroute is available
        run: |
          if command -v traceroute >/dev/null 2>&1; then
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y traceroute

      - name: Run network traces
        run: |
          sudo -E bash scripts/run_network_traces.sh targets/spacex_ips.tsv spacex_sat_ips
          sudo chown -R "$(id -u):$(id -g)" spacex_sat_ips

      - name: Upload satellite IP artifact
        uses: actions/upload-artifact@v4
        with:
          name: spacex-satellite-ip-candidates
          path: spacex_sat_ips/
          if-no-files-found: ignore

      - name: Commit satellite IP output
        run: |
          if [ -z "$(git status --porcelain -- spacex_sat_ips)" ]; then
            echo "No satellite IP changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add spacex_sat_ips
          git commit -m "Store SpaceX satellite IP candidates"
          git push
